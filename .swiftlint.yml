# SwiftLint configuration for symaira-operate

excluded:
  - .build
  - DerivedData

disabled_rules:
  - todo
  - trailing_comma
  - for_where
  - cyclomatic_complexity
  - line_length
  - function_parameter_count
  - trailing_newline

line_length:
  warning: 200
  error: 260
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded: [id, i, j, k, x, y, n, v, to, on, dx, dy]

function_body_length:
  warning: 140
  error: 220

type_body_length:
  warning: 450
  error: 650

file_length:
  warning: 700
  error: 900
  ignore_comment_only_lines: true
